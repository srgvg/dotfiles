# Portal backend configuration for xdg-desktop-portal
#
# Previously this was set to default=wlr, which routed ALL portal requests
# to xdg-desktop-portal-wlr. However, the wlr backend only implements
# Screenshot and ScreenCast interfaces. It does NOT implement the Settings
# interface (org.freedesktop.impl.portal.Settings), which is how Flatpak
# apps query the system color scheme (dark/light mode) via
# org.freedesktop.appearance.color-scheme.
#
# This caused Flatpak apps like Slack and ZapZap to not detect dark mode,
# because the Settings interface was entirely absent from the portal D-Bus
# object.
#
# Fix: use gnome/gtk backends as the default (they implement Settings and
# most other interfaces), and only route Screenshot and ScreenCast to the
# wlr backend, which handles those better on Wayland compositors.

[preferred]
# Default to gtk (then wlr fallback) for interfaces not explicitly routed below.
# gnome backend removed from default: it assumes GNOME Shell is present and fails
# silently on Sway for FileChooser, Notifications, and Settings.
default=gtk;wlr;

# FileChooser (Save As, upload dialogs): gtk backend explicitly. The gnome backend
# has GNOME Shell assumptions that cause silent failures on Sway.
org.freedesktop.impl.portal.FileChooser=gtk

# Settings (dark/light mode for Flatpak apps): gtk backend. gnome backend needs
# org.gnome.Shell for color-scheme, which doesn't exist on Sway.
org.freedesktop.impl.portal.Settings=gtk

# Notifications: gtk backend. gnome backend tries org.gtk.Notifications (GNOME Shell),
# causing Flatpak Electron app (Signal, Slack, ZapZap, Mattermost) notifications to
# fail silently. gtk falls back to org.freedesktop.Notifications (Mako).
org.freedesktop.impl.portal.Notification=gtk

# Screenshot and ScreenCast: wlr backend for Wayland compositor integration.
# Service is D-Bus activated on demand (XDG_CURRENT_DESKTOP=Sway + service file present).
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.ScreenCast=wlr
