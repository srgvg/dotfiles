# -*- conf -*-
# foot config — built to match the alacritty setup (~/etc/docs/foot-migration.md).
# Theme: Alabaster Dark (from ~/.config/alacritty/theme-svg.toml).
# Static colors: foot has no alacritty-colorscheme equivalent (switch-term-colors).

font=DroidSansM Nerd Font:size=10
font-bold=DroidSansM Nerd Font:weight=bold:size=10
font-italic=DroidSansM Nerd Font:slant=italic:size=10
font-bold-italic=DroidSansM Nerd Font:weight=bold:slant=italic:size=10
# Render crisply on the scale-1.5 output: size the font by the compositor scale
# factor (like alacritty/other wl clients) instead of physical DPI, so foot draws
# at native 1.5x rather than being linear-upscaled (blurry) by sway.
dpi-aware=no
# Cell padding to match the old alacritty [font.offset] look. NB: the previous
# *-letter-offset settings shifted the glyph *inside* a tight cell (clipping
# ascenders/descenders → the "not fully rendered" look); letter-spacing/line-height
# actually resize the cell. Vertical handled by line-height if needed (tune by eye).
letter-spacing=1
# A little breathing room between the grid and the window edge (was 0x0).
pad=2x2
# Use foot's own terminfo locally (undercurl, OSC-8 hyperlinks, sixel, accurate caps).
# foot answers XTGETTCAP so most SSH hosts cope without foot terminfo installed;
# revert to xterm-256color if a remote box misbehaves.
term=foot
selection-target=both
# 130x40 chars verified correct on the 1.5 fractional-scale output (man warns char
# sizing *may* misbehave on fractional scale, but it doesn't here). Keep as-is.
initial-window-size-chars=130x40

[cursor]
style=beam
blink=no
color=EBEBEB FF261E

[scrollback]
lines=100000
multiplier=3

[colors]
alpha=0.95
foreground=CECECE
background=0E1415
regular0=0E1415
regular1=e25d56
regular2=73ca50
regular3=e9bf57
regular4=4a88e4
regular5=915caf
regular6=23acdd
regular7=f0f0f0
bright0=777777
bright1=f36868
bright2=88db3f
bright3=f0bf7a
bright4=6f8fdb
bright5=e987e9
bright6=4ac9e2
bright7=FFFFFF

[security]
# Allow apps to *write* the host clipboard but not read it (safer over SSH/containers).
osc52=copy-enabled

[bell]
# Desktop notification (via mako/notify-send) when BEL arrives in an UNFOCUSED window.
# inhibit-when-focused defaults yes, so this only fires when you're looking elsewhere.
notify=yes

# Example custom-regex jump mode: tag git SHAs on screen, type the label to copy one.
[regex:gitsha]
regex=([0-9a-f]{7,40})

[key-bindings]
# Tag git SHAs; selecting one copies it to the clipboard.
regex-copy=[gitsha] Control+Shift+g
# Pipe the last command's output into vim in a new (server-mode) window.
# Requires OSC-133 shell integration (see ~/.bashrc.d/5-foot-shell-integration.bash).
pipe-command-output=[sh -c "f=$(mktemp); cat - > \"$f\"; footclient -E -- \"${EDITOR:-vim}\" \"$f\"; rm -f \"$f\""] Control+Shift+p
