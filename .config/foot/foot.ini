# -*- conf -*-
# foot config — built to match the alacritty setup (~/etc/docs/foot-migration.md).
# Theme: Alabaster Dark (from ~/.config/alacritty/theme-svg.toml).
# Static colors: foot has no alacritty-colorscheme equivalent (switch-term-colors).

font=DroidSansM Nerd Font:size=10
font-bold=DroidSansM Nerd Font:weight=bold:size=10
font-italic=DroidSansM Nerd Font:slant=italic:size=10
font-bold-italic=DroidSansM Nerd Font:weight=bold:slant=italic:size=10
# Render crisply on the scale-1.5 output: size the font by the compositor scale
# factor (like alacritty/other wl clients) instead of physical DPI, so foot draws
# at native 1.5x rather than being linear-upscaled (blurry) by sway.
dpi-aware=no
# Cell padding to match the old alacritty [font.offset] look. NB: the previous
# *-letter-offset settings shifted the glyph *inside* a tight cell (clipping
# ascenders/descenders → the "not fully rendered" look); letter-spacing/line-height
# actually resize the cell. Vertical handled by line-height if needed (tune by eye).
letter-spacing=1
# A little breathing room between the grid and the window edge (was 0x0).
pad=2x2
# Use foot's own terminfo locally (undercurl, OSC-8 hyperlinks, sixel, accurate caps).
# foot answers XTGETTCAP so most SSH hosts cope without foot terminfo installed;
# revert to xterm-256color if a remote box misbehaves.
term=foot
selection-target=both
# 130x40 chars verified correct on the 1.5 fractional-scale output (man warns char
# sizing *may* misbehave on fractional scale, but it doesn't here). Keep as-is.
initial-window-size-chars=130x40
# Default app-id for windows launched without an explicit --app-id — notably the ones foot
# spawns itself via spawn-terminal (Ctrl+Shift+n / the $mod+Return OSC-7 path, see below), which
# would otherwise land as plain "foot". term/termf/dfzf pass --app-id and still override this.
app-id=terminal-tiled

[cursor]
style=beam
blink=no

[scrollback]
lines=100000
multiplier=3

[colors-dark]
alpha=0.95
# Cursor color moved here from [cursor] (foot >=1.something removed [cursor].color).
# Order is <foreground/text> <background/cursor>: light text on a red cursor block.
cursor=EBEBEB FF261E
foreground=CECECE
background=0E1415
regular0=0E1415
regular1=e25d56
regular2=73ca50
regular3=e9bf57
regular4=4a88e4
regular5=915caf
regular6=23acdd
regular7=f0f0f0
bright0=777777
bright1=f36868
bright2=88db3f
bright3=f0bf7a
bright4=6f8fdb
bright5=e987e9
bright6=4ac9e2
bright7=FFFFFF

[security]
# Allow apps to *write* the host clipboard but not read it (safer over SSH/containers).
osc52=copy-enabled

[bell]
# Bell OSD notifications DISABLED (notify=no); a visual flash is the local cue instead
# (visual=yes). No sway client.urgent border is possible: foot signals via the
# xdg-system-bell-v1 protocol, which sway 1.12 does NOT implement (journal:
# "compositor does not implement the XDG system bell protocol"), and sway only honors
# urgency for XWayland windows. readline's BEL source is silenced in ~/.inputrc
# (set bell-style none), so the flash only fires for real \a output from programs.
# foot has NO live reload (SIGUSR1 terminates it) — changes here only affect NEW windows.
# See ~/etc/docs/foot-migration.md §0c. Flip notify to yes for a popup.
notify=no
visual=yes

# Example custom-regex jump mode: tag git SHAs on screen, type the label to copy one.
[regex:gitsha]
regex=([0-9a-f]{7,40})

[key-bindings]
# Same-dir spawn (OSC-7). Default Control+Shift+n PLUS a Super variant: ~/bin/term's $mod+Return
# dispatcher injects Ctrl+Shift+n via wtype while the physical Super (Mod4) is still held, so
# foot receives Mod4+Control+Shift+n — bind both to cover Super held/released.
# NB: we do NOT reuse Mod4+Return here. sway already owns Mod4+Return ($mod+Return → term) and
# Mod4+Control+Return ($mod+Ctrl+Return → floating term); injecting either would be re-grabbed by
# sway (recursion / wrong action) instead of reaching foot. Ctrl+Shift+n is foot's native default
# and is unbound in sway, so the synthetic event passes through. See ~/etc/docs/foot-migration.md §0d.
spawn-terminal=Control+Shift+n Mod4+Control+Shift+n
# Tag git SHAs; selecting one copies it to the clipboard.
regex-copy=[gitsha] Control+Shift+g
# Pipe the last command's output into vim in a new window.
# Requires OSC-133 shell integration (emitted by ble.sh; see ~/.bashrc.d/set_term_title.bash).
pipe-command-output=[sh -c "f=$(mktemp); cat - > \"$f\"; foot \"${EDITOR:-vim}\" \"$f\"; rm -f \"$f\""] Control+Shift+p
