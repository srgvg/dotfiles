# ask_fallback: defer (claude target) — nah blocks dangerous + allows safe
# outright; anything it would ask about emits nothing so Claude's own
# permission/auto-mode decides (active_allow stays default true, so nah-safe
# still short-circuits). Per-target setting; the claude hook runs target=claude.
