[mgr]
prepend_keymap = [
	# Smart enter: cd into dirs, open files
	{ on = "l",       run = "plugin smart-enter", desc = "Enter dir or open file" },
	{ on = "<Right>", run = "plugin smart-enter", desc = "Enter dir or open file" },
	{ on = "<Enter>", run = "plugin smart-enter", desc = "Enter dir or open file" },

	# Drop to $SHELL
	{ on = "!", run = 'shell "$SHELL" --block', desc = "Open $SHELL here", for = "unix" },

	# K/J: 5-line jump (default binds K/J to seek)
	{ on = "K", run = "arrow -5", desc = "Move cursor up 5 lines" },
	{ on = "J", run = "arrow 5",  desc = "Move cursor down 5 lines" },

	# Seek via Alt (K/J are remapped above)
	{ on = "<A-k>",       run = "seek -5", desc = "Seek up 5 units in preview" },
	{ on = "<A-j>",       run = "seek 5",  desc = "Seek down 5 units in preview" },
	{ on = "<A-PageUp>",  run = "seek -5", desc = "Seek up 5 units in preview" },
	{ on = "<A-PageDown>", run = "seek 5", desc = "Seek down 5 units in preview" },

	# Extra navigation
	{ on = "<S-Up>",       run = "arrow -5",   desc = "Move cursor up 5 lines" },
	{ on = "<S-Down>",     run = "arrow 5",    desc = "Move cursor down 5 lines" },
	{ on = "<C-PageUp>",   run = "arrow -50%", desc = "Move cursor up half page" },
	{ on = "<C-PageDown>", run = "arrow 50%",  desc = "Move cursor down half page" },

	# C-q to close tab (default uses C-c)
	{ on = "<C-q>",   run = "close",              desc = "Close the current tab, or quit if it's last" },
	{ on = "<C-Enter>", run = "open --interactive", desc = "Open files interactively" },

	# Swap fzf/zoxide (default: z=fzf, Z=zoxide)
	{ on = "z", run = "plugin zoxide", desc = "Jump to a directory via zoxide" },
	{ on = "Z", run = "plugin fzf",    desc = "Jump to a directory via fzf" },

	# Custom goto
	{ on = [ "g", "t" ], run = "cd /tmp", desc = "Go to /tmp" },
]

[tasks]
prepend_keymap = [
	{ on = "K",     run = "arrow -5", desc = "Move cursor up 5 lines" },
	{ on = "J",     run = "arrow 5",  desc = "Move cursor down 5 lines" },
	{ on = "<C-q>", run = "close",    desc = "Close task manager" },
]

[pick]
prepend_keymap = [
	{ on = "K",        run = "arrow -5", desc = "Move cursor up 5 lines" },
	{ on = "J",        run = "arrow 5",  desc = "Move cursor down 5 lines" },
	{ on = "<S-Up>",   run = "arrow -5", desc = "Move cursor up 5 lines" },
	{ on = "<S-Down>", run = "arrow 5",  desc = "Move cursor down 5 lines" },
	{ on = "<C-q>",    run = "close",    desc = "Cancel selection" },
]

[input]
prepend_keymap = [
	{ on = "<C-q>", run = "close", desc = "Cancel input" },
]

[cmp]
prepend_keymap = [
	{ on = "<C-q>", run = "close", desc = "Cancel completion" },
]

[help]
prepend_keymap = [
	{ on = "q",        run = "close",    desc = "Hide the help" },
	{ on = "<C-q>",    run = "close",    desc = "Hide the help" },
	{ on = "K",        run = "arrow -5", desc = "Move cursor up 5 lines" },
	{ on = "J",        run = "arrow 5",  desc = "Move cursor down 5 lines" },
	{ on = "<S-Up>",   run = "arrow -5", desc = "Move cursor up 5 lines" },
	{ on = "<S-Down>", run = "arrow 5",  desc = "Move cursor down 5 lines" },
	{ on = "/",        run = "filter",   desc = "Filter help items" },
]
