# Browser Picker Configuration
# Format:  Display Label  |  command %u
# - First entry = top of list (selected immediately with Enter = default browser)
# - %u is replaced with the URL (shell-quoted for safety)
# - Use full paths: this runs in non-interactive portal contexts with restricted PATH
# - Changes take effect immediately (no restart needed)
#
# Firefox wrapper note: /usr/bin/firefox -> ~/bin/firefox hardcodes -P serge
# Use ~/bin/firefox.real directly here to control the profile yourself

Firefox (serge)       | /home/serge/bin/firefox.real --new-tab -P serge %u
Edge (Teledyne)      | /usr/bin/microsoft-edge-stable "--profile-directory=Profile 3" %u

